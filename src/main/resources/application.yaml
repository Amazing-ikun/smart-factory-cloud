spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_factory?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.changshademo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    # 业务日志：INFO 级别（打印业务操作）
    com.example.changshademo.service: INFO
    # 框架日志：WARN 级别（减少无用信息）
    org.springframework: WARN
    org.apache.catalina: WARN
    # HTTP请求日志：可以关闭或改成 INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO
    # MyBatis SQL日志：开发时用 DEBUG，生产时用 INFO
    com.example.changshademo.mapper: DEBUG
  file:
    name: logs/application.log

  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

server:
  port: 9999
